version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dobroswipe_db
    environment:
      POSTGRES_USER: dobro
      POSTGRES_PASSWORD: dobro_password
      POSTGRES_DB: dobroswipe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dobroswipe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dobroswipe_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dobro:dobro_password@db:5432/dobroswipe
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_please_change_in_prod_1234567890
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
